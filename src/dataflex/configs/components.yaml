# configs/components.yaml
selectors:
  # Dynamic selectors
  nice:
    name: nice
    params:
      cache_dir: ../dataflex_saves/nice_output
      gradient_type: adam
      proj_dim: 4096
      seed: 123
      save_interval: 16
      reward_model_backend: local_vllm   # choices: [local_vllm, api]
      reward_backend_params:
        local_vllm:
          hf_model_name_or_path: meta-llama/Llama-3.1-8B
          vllm_tensor_parallel_size: 1
          vllm_temperature: 0.0
          vllm_top_p: 0.9
          vllm_max_tokens: 512
          vllm_top_k: 40
          vllm_seed: 42
          vllm_max_model_len: null
          vllm_gpu_memory_utilization: 0.9
        api:
          api_url: https://api.openai.com/v1/chat/completions
          api_key: DF_API_KEY
          model_name: gpt-4o
          temperature: 0.0    
      mc_samples: 4
      max_new_tokens: 512
      generation_temperature: 0.7
      max_prompt_length: 4096

  less:
    name: less
    params:
      cache_dir: ../dataflex_saves/less_output
      gradient_type: adam
      proj_dim: 4096
      seed: 123
      save_interval: 16

  cluster_less:
    name: cluster_less
    params:
      cache_dir: ../dataflex_saves/cluster_less_output
      gradient_type: adam
      proj_dim: 4096
      seed: 42
      save_interval: 16
      cluster_size: 64
      samples_per_cluster: 4
      clustering_batch_size: 8
      clustering_max_iter: 10
      clustering_method: kmeans
      representative_strategy: random
      # Optional: standalone model for the ONE-TIME clustering embeddings.
      # When set, clustering is done once with this model and frozen for the
      # whole run; the training model is only used for the per-step gradient
      # refresh. Leave null to use the training model (legacy behaviour).
      embedding_model_name_or_path: null
      embedding_model_dtype: auto
      embedding_layer: -1

  loss:
    name: loss
    params:
      cache_dir: ../dataflex_saves/loss_output
      focus: "medium"

  delta_loss:
    name: delta_loss
    params:
      cache_dir: ../dataflex_saves/delta_loss_output
      window_size: 0.2

  tsds:
    name: tsds
    params:
      probs_path: ./src/dataflex/offline_selector/tsds_probs.npy
      cache_dir: ../dataflex_saves/tsds_output
  near:
    name: near
    params:
      indices_path: ./src/dataflex/offline_selector/top_indices.npy
      cache_dir: ../dataflex_saves/near_output
  
  random:
    name: random
    params:
      cache_dir: ../dataflex_saves/random_output
      seed: 42
      replacement: false

  custom:
    name: custom
    params:
      cache_dir: ../dataflex_saves/custom_output

mixers:
  # Dynamic mixers
  random:
    name: random
    params:
      seed: 42
  
  doremi:
    name: doremi
    params:
      # Path to the reference model checkpoint (Step 1 of DoReMi)
      # reference_model_path: /path/to/ckpt/Qwen2.5-0.5B
      reference_model_path: /path/to/dataflex_saves/Qwen2.5-0.5B/doremi_step1_static_qwen_pt_full_result/checkpoint-xxx
      # # Set to null if no reference model available
      # reference_model_path: null
      # Learning rate for domain weight updates (eta in the paper)
      reweight_eta: 0.1
      reweight_eps: 0.01 # Smoothing parameter for domain weights (epsilon in the paper)

  
  # Static mixer - for DoReMi's Step 1 and Step 3
  static:
    name: static
    params:
      # fixed proportions
      proportions: [0.5, 0.5]  # corresponding proportions for each domain
      # proportions: null  # use uniform distribution
      # proportions: [0.541, 0.287, 0.042, 0.037, 0.034, 0.031, 0.028] # For SlimePajama-6B dataset
  odm:
    name: odm
    params:
      # Online Data Mixing (ODM) uses Multi-Armed Bandits (Exp3) for dynamic mixing
      
      # Alpha (smoothing_factor): smoothing parameter for exponential moving average (0 to 1)
      # Higher alpha = more weight on historical rewards, more stable but slower to adapt
      # Lower alpha = more responsive to recent rewards, faster adaptation but more volatile
      alpha: 0.9
      
      # Warmup steps: number of steps to use initial proportions before starting ODM
      # Typically 1% of total training steps
      warmup_steps: 2000
      # warmup_steps: 10 # debug
      # reward_scale: Amplify loss signal for better domain differentiation
      reward_scale: 15.0
      
      # min_exploration_rate: Minimum exploration rate (annealing floor)
      min_exploration_rate: 0.03
      # Initial proportions for warmup period and ODM initialization
      # If not specified, uses uniform distribution
      initial_proportions: [0.5, 0.5] # debug
      # initial_proportions: null  # Use uniform distribution if null
      # initial_proportions: [0.541, 0.287, 0.042, 0.037, 0.034, 0.031, 0.028] # for odm on SlimePajam-6B dataset
  
  dynamic_moe:
    name: dynamic_moe
    params:
      eta: 10.0           # Update step size
      c: 0.05             # Smoothing parameter
      collect_steps: 5    # Number of batches to sample per domain to estimate gate loads
      eval_samples: 1000
      eval_batch_size: 32
  
weighters:
  # Dynamic data weights
  loss:
    name: loss
    params:
      strategy: linupper # choices: [linupper, uniform, quadratic, extremes]
      delta: 1.0
  
  adapt:
    name: adapt
    params:
      tau: 1.0              # 温度，越小权重区分越锐利
      refresh_interval: 50  # 每多少步用当前模型刷新一次 anchor 向量
      anchor_batch_size: 8  # 计算句向量时的前向 batch 大小
      clip: null            # 可选权重上限，防梯度爆炸

  custom:
    name: custom
    params:
      strategy: uniform
